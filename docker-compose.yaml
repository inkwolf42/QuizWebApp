version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: quiz_postgres
    environment:
      POSTGRES_DB: quiz_db
      POSTGRES_USER: quiz_user
      POSTGRES_PASSWORD: Z9n26a6fYi4ZsIhNrYWvEKli7cBlji7hxRcI1hQe1VC1oiXbKH
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - laravel_network

  # Optional: Add your Laravel app container
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quiz_app
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    networks:
      - laravel_network

volumes:
  postgres_data:

networks:
  laravel_network:
    driver: bridge
